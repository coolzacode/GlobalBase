<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlobalBase</title>
  </head>
  <body>
    <main>
      <section class="result">
        <h1 id="welcome-message">Welcome to GlobalBase</h1>

        <div id="loader" class="loader hidden-element">
          <div class="spinner"></div>
        </div>

        <article
          id="dashboard-display"
          class="dashboard-display hidden-element"
        >
          <header>
            <h2 id="country-name"></h2>
            <p id="government-type"></p>
          </header>

          <section class="info-grid">
            <div class="info-card">
              <h3>Country Info</h3>
              <dl>
                <dt>Capital:</dt>
                <dd id="capital-value"></dd>
                <dt>Time Zones:</dt>
                <dd id="timezone-value"></dd>
              </dl>
            </div>

            <div class="info-card">
              <h3>Currency Info</h3>
              <dl>
                <dt>Symbol:</dt>
                <dd id="currency-symbol"></dd>
                <dt>Code:</dt>
                <dd id="currency-code"></dd>
                <dt>Name:</dt>
                <dd id="currency-name"></dd>
              </dl>
            </div>
          </section>

          <section id="borders-section">
            <h3>Bordering Countries</h3>
            <div id="borders-list" class="borders-list"></div>
          </section>
        </article>

        <div id="error-message" class="error-box hidden-element">
          <p id="error-text">Something went wrong. Please try again.</p>
        </div>
      </section>

      <section class="select-box" aria-label="Country Search">
        <form id="search-form" class="search-box">
          <input
            type="text"
            id="selected-country"
            placeholder="Seach country..."
            autocomplete="off"
            aria-autocomplete="list"
            aria-controls="countries-list"
          />
        </form>
        <ul
          id="countries-list"
          class="options hidden-element"
          role="listbox"
        ></ul>
      </section>
    </main>
  </body>
</html>
